<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Couchverse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <!-- Setup screen (shown before session starts).
         Mirrors the session screen: stacked 2:3 portraits in the middle,
         controls panel at the bottom. The portraits visually "become" the
         live avatars once connected, so setup → session reads as the same
         space animating to life. -->
    <div id="setup-screen">
      <div id="cast-stack">
        <div class="cast-portrait">
          <img src="icons/fox_2x3.jpg" alt="Fox" />
          <div class="cast-badge-wrap"><span>Fox - Comedian</span></div>
        </div>
        <div class="cast-portrait">
          <img src="icons/alien_2x3.jpg" alt="Alien" />
          <div class="cast-badge-wrap"><span>Alien - Chaos agent</span></div>
        </div>
      </div>

      <div id="setup-controls">
        <button id="start-btn" class="btn-primary" disabled>
          Start Couchverse
        </button>
        <p id="setup-error" class="error hidden"></p>
      </div>
    </div>

    <!-- Session screen (shown after connection) -->
    <div id="session-screen" class="hidden">

      <!-- Two stacked avatar slots — populated dynamically when each
           lemonslice-avatar-<name> participant connects. The data-name
           attribute is the persona name; sidepanel.js routes tracks +
           speaker-state by matching it.

           Each slot shows a still preview (icons/*_2x3.jpg) until the
           LiveKit video track attaches, at which point the live avatar
           fades in over the preview. Keeps the panel visually populated
           during the ~1-2s avatar boot instead of showing dead space. -->
      <div id="avatars-stack">
        <div class="avatar-slot has-preview" data-name="fox" data-label="Fox - Comedian">
          <img class="avatar-preview" src="icons/fox_2x3.jpg" alt="Fox" />
          <div class="avatar-video"></div>
          <div class="avatar-badge">
            <span>Fox - Comedian</span>
          </div>
          <div class="reactions"></div>
          <div class="captions"></div>
        </div>

        <div class="avatar-slot has-preview" data-name="chaos_agent" data-label="Alien - Chaos agent">
          <img class="avatar-preview" src="icons/alien_2x3.jpg" alt="Alien" />
          <div class="avatar-video"></div>
          <div class="avatar-badge">
            <span>Alien - Chaos agent</span>
          </div>
          <div class="reactions"></div>
          <div class="captions"></div>
        </div>
      </div>

      <!-- Controls — Game HUD Panel.
           Pacing dials live in a collapsed disclosure so they don't eat
           vertical space the avatars want. Set-and-forget settings —
           users adjust once and rarely revisit, so the default-closed
           state buys ~100px of avatar height back. Skip/End stay pinned. -->
      <div id="controls">
        <details id="pacing-disclosure">
          <summary>
            <span class="disclosure-label">Pacing</span>
            <span class="disclosure-chevron" aria-hidden="true">⌄</span>
          </summary>

          <div class="disclosure-body">
            <div class="control-group" role="group" aria-label="Chattiness">
              <div class="control-label">
                <span class="control-title">Chattiness</span>
                <span class="control-hint" id="chattiness-hint">how often they chime in</span>
              </div>
              <div class="segmented" data-setting="frequency">
                <button type="button" class="seg-btn" data-value="quiet">Quiet</button>
                <button type="button" class="seg-btn is-active" data-value="normal">Normal</button>
                <button type="button" class="seg-btn" data-value="chatty">Chatty</button>
              </div>
            </div>

            <div class="control-group" role="group" aria-label="Reply length">
              <div class="control-label">
                <span class="control-title">Reply length</span>
                <span class="control-hint" id="length-hint">how much they say per turn</span>
              </div>
              <div class="segmented" data-setting="length">
                <button type="button" class="seg-btn" data-value="short">Short</button>
                <button type="button" class="seg-btn is-active" data-value="normal">Normal</button>
                <button type="button" class="seg-btn" data-value="long">Long</button>
              </div>
            </div>
          </div>
        </details>

        <div class="control-actions">
          <button id="skip-btn" class="btn-skip" disabled>Skip commentary</button>
          <button id="end-btn" class="btn-end">End</button>
        </div>
      </div>
    </div>

    <!-- Hidden audio-element sink. Each persona's remote audio track is
         attached here (volume=0) purely to keep Chrome's WebRTC pipeline
         pulling RTP samples — the audible path is the WebAudio graph
         built from the same MediaStreamTrack in sidepanel.js. -->
    <div id="audio-container" class="hidden"></div>
  </div>

  <script src="dist/sidepanel.js"></script>
</body>
</html>
