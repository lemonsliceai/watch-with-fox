<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Tile (yolk yellow w/ thick ink border, matches couchverse-web neo-brutalist tiles) -->
  <rect x="4" y="4" width="120" height="120" rx="24" fill="#fcd449" stroke="#2a1810" stroke-width="6"/>

  <!-- ===== FOX (left), peeking over couch back ===== -->
  <!-- Ears: orange w/ dark tips -->
  <path d="M 22 22 L 38 50 L 16 52 Z" fill="#ff6a1a" stroke="#2a1810" stroke-width="4" stroke-linejoin="round"/>
  <path d="M 56 22 L 60 52 L 40 50 Z" fill="#ff6a1a" stroke="#2a1810" stroke-width="4" stroke-linejoin="round"/>
  <!-- Inner ear darks -->
  <path d="M 24 28 L 33 47 L 22 48 Z" fill="#c44a08"/>
  <path d="M 54 28 L 56 48 L 45 47 Z" fill="#c44a08"/>
  <!-- Fox face -->
  <circle cx="38" cy="60" r="22" fill="#ff6a1a" stroke="#2a1810" stroke-width="5"/>
  <!-- Cheek tuft (cream muzzle) -->
  <ellipse cx="38" cy="69" rx="11" ry="8" fill="#fffaec" stroke="#2a1810" stroke-width="3"/>
  <!-- Eyes -->
  <circle cx="30" cy="58" r="3" fill="#2a1810"/>
  <circle cx="46" cy="58" r="3" fill="#2a1810"/>
  <!-- Nose -->
  <ellipse cx="38" cy="65" rx="2.5" ry="2" fill="#2a1810"/>

  <!-- ===== ALIEN (right), peeking over couch back ===== -->
  <!-- Antennae stalks -->
  <path d="M 80 50 Q 80 38 78 26" fill="none" stroke="#2a1810" stroke-width="4" stroke-linecap="round"/>
  <path d="M 100 50 Q 102 38 104 28" fill="none" stroke="#2a1810" stroke-width="4" stroke-linecap="round"/>
  <!-- Antenna bulbs (teal) -->
  <circle cx="78" cy="22" r="6" fill="#7ed4c2" stroke="#2a1810" stroke-width="3.5"/>
  <circle cx="104" cy="24" r="6" fill="#7ed4c2" stroke="#2a1810" stroke-width="3.5"/>
  <!-- Alien face -->
  <circle cx="90" cy="60" r="22" fill="#7ed4c2" stroke="#2a1810" stroke-width="5"/>
  <!-- Cheek blush dots (cheek pink) -->
  <circle cx="76" cy="68" r="3" fill="#f4a3b8"/>
  <circle cx="104" cy="68" r="3" fill="#f4a3b8"/>
  <!-- Big eyes -->
  <ellipse cx="83" cy="60" rx="4.5" ry="6" fill="#2a1810"/>
  <ellipse cx="97" cy="60" rx="4.5" ry="6" fill="#2a1810"/>
  <!-- Eye sparkles -->
  <circle cx="84.5" cy="57.5" r="1.5" fill="#fffaec"/>
  <circle cx="98.5" cy="57.5" r="1.5" fill="#fffaec"/>

  <!-- ===== COUCH (front-most, hides bottom of heads) ===== -->
  <!-- Left arm -->
  <rect x="6" y="84" width="18" height="34" rx="7" fill="#ff6a1a" stroke="#2a1810" stroke-width="5" stroke-linejoin="round"/>
  <!-- Right arm -->
  <rect x="104" y="84" width="18" height="34" rx="7" fill="#ff6a1a" stroke="#2a1810" stroke-width="5" stroke-linejoin="round"/>
  <!-- Couch back -->
  <rect x="18" y="74" width="92" height="36" rx="9" fill="#ff6a1a" stroke="#2a1810" stroke-width="5" stroke-linejoin="round"/>
  <!-- Seat cushion (deeper orange to read as 2-tone) -->
  <rect x="20" y="98" width="88" height="20" rx="7" fill="#c44a08" stroke="#2a1810" stroke-width="5" stroke-linejoin="round"/>
  <!-- Cushion split -->
  <line x1="64" y1="100" x2="64" y2="116" stroke="#2a1810" stroke-width="3" stroke-linecap="round"/>
</svg>
